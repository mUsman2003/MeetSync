<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetSync</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ─── MAIN VIEW ───────────────────────────────────────────────── -->
  <div id="main-view">

    <!-- Header -->
    <div class="header">
      <div class="header-top">
        <div class="brand">
          <div class="brand-icon">⚡</div>
          MeetSync
        </div>
        <div id="status-badge" class="status-badge standby">
          <span id="status-dot" class="dot dot-standby"></span>
          <span id="status-text">Standby</span>
        </div>
      </div>
      <div id="meeting-title" class="meeting-title">Not in a Google Meet</div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-participants">0</div>
        <div class="stat-label">Participants</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-chats">0</div>
        <div class="stat-label">Chat Msgs</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-duration">—</div>
        <div class="stat-label">Duration</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-participants">👥 Participants</button>
      <button class="tab-btn"       id="tab-chats">💬 Chat Log</button>
    </div>

    <!-- Panels -->
    <div class="panels">
      <div class="tab-panel active" id="panel-participants">
        <div class="empty">
          <div class="empty-icon">👥</div>
          <span>Waiting for participants…</span>
        </div>
      </div>
      <div class="tab-panel" id="panel-chats">
        <div class="empty">
          <div class="empty-icon">💬</div>
          <span>No chat messages yet</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <button class="btn btn-primary" id="btn-download" disabled>
        ⬇ Download Report
      </button>
      <button class="btn btn-ghost" id="btn-clear" title="Clear session data">
        🗑 Clear
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
