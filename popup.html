<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetSync</title>
  <style>
    /* ── Reset & Base ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222536;
      --border: #2e3249;
      --accent: #4f8ef7;
      --accent-dim: rgba(79,142,247,0.15);
      --green: #3ecf8e;
      --red: #f0605a;
      --yellow: #f7c948;
      --text: #e8eaf0;
      --text-dim: #7c82a0;
      --text-muted: #4a4f6a;
      --event-color: #a78bfa;
      --event-bg: rgba(167,139,250,0.08);
      --chat-bg: rgba(79,142,247,0.06);
      --radius: 8px;
      --radius-sm: 5px;
    }

    body {
      width: 380px;
      min-height: 480px;
      max-height: 600px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .header-text { flex: 1; min-width: 0; }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .meeting-id {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* ── Status Bar ──────────────────────────────────────────── */
    .status-bar {
      padding: 7px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.warning { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .status-dot.error { background: var(--red); }

    .status-text {
      flex: 1;
      font-size: 11.5px;
      color: var(--text-dim);
    }

    .count-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1px 8px;
    }

    /* ── Warning Banner ──────────────────────────────────────── */
    .warning-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      background: rgba(247,201,72,0.1);
      border-bottom: 1px solid rgba(247,201,72,0.3);
      font-size: 11.5px;
      color: var(--yellow);
      flex-shrink: 0;
    }
    .warning-banner.visible { display: flex; }
    .warning-banner .warn-icon { font-size: 14px; }

    /* ── Feed ────────────────────────────────────────────────── */
    .feed-wrapper {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .feed-wrapper::-webkit-scrollbar { width: 4px; }
    .feed-wrapper::-webkit-scrollbar-track { background: transparent; }
    .feed-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 48px 24px;
      color: var(--text-muted);
      text-align: center;
    }
    .empty-state .empty-icon { font-size: 32px; opacity: 0.5; }
    .empty-state .empty-title { font-size: 13px; font-weight: 600; color: var(--text-dim); }
    .empty-state .empty-sub { font-size: 11.5px; line-height: 1.5; }

    /* Chat entry */
    .entry {
      padding: 7px 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      transition: background 0.15s;
    }
    .entry:hover { background: rgba(255,255,255,0.02); }

    .entry.chat { background: transparent; }
    .entry.event {
      background: var(--event-bg);
      border-left: 2px solid var(--event-color);
      padding-left: 12px;
    }

    .entry-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .entry.event .entry-avatar {
      background: var(--event-color);
      font-size: 12px;
    }

    .entry-body { flex: 1; min-width: 0; }

    .entry-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .entry-sender {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    .entry.event .entry-sender { color: var(--event-color); }

    .entry-time {
      font-size: 10.5px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .entry-message {
      font-size: 12.5px;
      color: var(--text-dim);
      line-height: 1.5;
      word-break: break-word;
    }
    .entry.event .entry-message {
      color: var(--event-color);
      font-style: italic;
      opacity: 0.85;
    }

    /* ── Footer / Export ─────────────────────────────────────── */
    .footer {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 7px;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 6px 11px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
      font-family: inherit;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .btn:active { transform: scale(0.97); }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .btn.primary:hover {
      background: #6ba0f9;
      border-color: #6ba0f9;
      color: white;
    }

    .btn.success {
      background: var(--green);
      border-color: var(--green);
      color: #0f1117;
    }

    .btn-icon {
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: var(--radius-sm);
    }

    .btn-spacer { flex: 1; }

    /* ── Animations ──────────────────────────────────────────── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .entry { animation: fadeSlideIn 0.2s ease; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status-dot.active { animation: pulse 2s ease-in-out infinite; }

    /* ── Scrolled-up indicator ───────────────────────────────── */
    .scroll-btn {
      position: sticky;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      align-items: center;
      gap: 4px;
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      border: none;
      margin: 0 auto 2px;
      width: fit-content;
    }
    .scroll-btn.visible { display: flex; }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <div class="header">
    <div class="logo">📋</div>
    <div class="header-text">
      <div class="header-title">MeetSync</div>
      <div class="meeting-id" id="meetingId">No active meeting</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-icon" id="syncBtn" title="Sync now">🔄</button>
    </div>
  </div>

  <!-- ── Status Bar ── -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">Waiting for Google Meet…</div>
    <div class="count-badge" id="countBadge">0</div>
  </div>

  <!-- ── Warning Banner ── -->
  <div class="warning-banner" id="warningBanner">
    <span class="warn-icon">⚠️</span>
    <span>Chat panel must remain open to sync messages.</span>
  </div>

  <!-- ── Feed ── -->
  <div class="feed-wrapper" id="feedWrapper">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💬</div>
      <div class="empty-title">No messages yet</div>
      <div class="empty-sub">Open the chat panel in your Google Meet and messages will appear here automatically.</div>
    </div>
    <div id="feed"></div>
    <button class="scroll-btn" id="scrollBtn">↓ New messages</button>
  </div>

  <!-- ── Footer ── -->
  <div class="footer">
    <button class="btn" id="exportJsonBtn">⬇ JSON</button>
    <button class="btn" id="exportCsvBtn">⬇ CSV</button>
    <div class="btn-spacer"></div>
    <button class="btn" id="clearBtn" title="Clear current session">🗑 Clear</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
